<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terraria 2D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100vh;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            z-index: 10;
        }

        #inventory {
            position: absolute;
            bottom: 10px;
            left: 10px;
            display: grid;
            grid-template-columns: repeat(5, 40px);
            gap: 5px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 5px;
            z-index: 10;
        }

        .slot {
            width: 40px;
            height: 40px;
            background: rgba(100, 100, 100, 0.6);
            border: 2px solid #444;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .slot:hover {
            background: rgba(150, 150, 150, 0.8);
            border-color: #888;
        }

        .slot.selected {
            border-color: #ffff00;
            background: rgba(200, 200, 0, 0.6);
        }

        #controls {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: white;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            text-align: right;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div>Posição: <span id="posX">0</span>, <span id="posY">0</span></div>
            <div>Blocos: <span id="blockCount">0</span></div>
        </div>
        <div id="inventory"></div>
        <div id="controls">
            <div>← → Mover | ESPAÇO Pular</div>
            <div>Clique Minerar | Shift+Clique Colocar</div>
            <div>1-5 Selecionar bloco</div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
