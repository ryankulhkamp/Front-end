<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f4f0;--bg2:#ffffff;--bg3:#eceae4;
  --text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;
  --accent:#d4451a;--accent2:#ff6b3d;
  --border:#ddddd8;--card:#ffffff;
  --nav:#1a1a18;--nav-text:#ffffff;
  --badge:#d4451a;--badge-text:#fff;
  --input-bg:#f0efeb;--input-border:#d0d0c8;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --success:#2d7a4f;
}
[data-theme="dark"]{
  --bg:#141412;--bg2:#1e1e1b;--bg3:#252522;
  --text:#f0efe9;--text2:#a8a8a0;--text3:#6a6a64;
  --accent:#ff6b3d;--accent2:#ff8c65;
  --border:#2e2e2a;--card:#1e1e1b;
  --nav:#0e0e0c;--nav-text:#f0efe9;
  --badge:#ff6b3d;--badge-text:#141412;
  --input-bg:#252522;--input-border:#3a3a36;
  --shadow:0 2px 12px rgba(0,0,0,0.3);
  --success:#3db86f;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background 0.3s,color 0.3s}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

nav{background:var(--nav);color:var(--nav-text);padding:0 24px;display:flex;align-items:center;gap:16px;height:56px;position:sticky;top:0;z-index:100}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;letter-spacing:1px;color:var(--accent2);flex:0 0 auto}
.nav-links{display:flex;gap:4px;flex:1;margin-left:16px}
.nav-links button{background:none;border:none;color:rgba(255,255,255,0.7);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.nav-links button:hover,.nav-links button.active{background:rgba(255,255,255,0.12);color:#fff}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.icon-btn{background:rgba(255,255,255,0.1);border:none;color:var(--nav-text);width:36px;height:36px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background 0.2s;position:relative;flex-shrink:0}
.icon-btn:hover{background:rgba(255,255,255,0.2)}
.cart-badge{position:absolute;top:-4px;right:-4px;background:var(--accent);color:white;border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center}

.page{display:none;padding:24px}
.page.active{display:block}

.hero{background:var(--nav);border-radius:16px;padding:40px 32px;margin-bottom:24px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:200px;height:200px;border-radius:50%;background:var(--accent);opacity:0.15}
.hero h1{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:800;color:#fff;line-height:1;margin-bottom:8px}
.hero h1 span{color:var(--accent2)}
.hero p{color:rgba(255,255,255,0.6);font-size:14px;margin-bottom:20px;max-width:320px}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;transition:all 0.2s;display:inline-block}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border);padding:8px 16px;border-radius:8px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all 0.2s}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}

.section-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;margin-bottom:4px;color:var(--text)}
.section-sub{color:var(--text3);font-size:13px;margin-bottom:16px}

.cats{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.cat-btn{background:var(--bg3);border:1.5px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.2s}
.cat-btn:hover,.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.product-card{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow)}
.product-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.12)}
.product-img{height:160px;display:flex;align-items:center;justify-content:center;font-size:64px;background:var(--bg3)}
.product-info{padding:12px}
.product-cat{font-size:10px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.product-name{font-weight:500;font-size:14px;margin-bottom:4px;color:var(--text)}
.product-price{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--accent)}
.product-price .old{font-size:13px;color:var(--text3);text-decoration:line-through;font-family:'DM Sans',sans-serif;font-weight:400;margin-right:4px}
.product-actions{display:flex;gap:6px;margin-top:10px}
.btn-add{flex:1;background:var(--accent);color:#fff;border:none;padding:7px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;transition:background 0.2s}
.btn-add:hover{background:var(--accent2)}
.btn-fav{width:32px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:14px;transition:all 0.2s;display:flex;align-items:center;justify-content:center}
.btn-fav:hover,.btn-fav.active{background:#fee;border-color:#f66}

.badge-sale{position:absolute;top:8px;left:8px;background:var(--accent);color:#fff;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.5px}
.badge-new{position:absolute;top:8px;left:8px;background:#2d7a4f;color:#fff;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.5px}
.product-wrap{position:relative}

.cart-empty{text-align:center;padding:40px;color:var(--text3)}
.cart-empty .icon{font-size:48px;margin-bottom:12px}
.cart-list{display:flex;flex-direction:column;gap:12px;max-width:600px}
.cart-item{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;display:flex;gap:14px;align-items:center}
.cart-item .icon{font-size:40px;width:60px;height:60px;background:var(--bg3);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cart-item-info{flex:1}
.cart-item-name{font-weight:500;font-size:14px;color:var(--text)}
.cart-item-price{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--accent)}
.qty-controls{display:flex;align-items:center;gap:8px;margin-top:6px}
.qty-btn{width:26px;height:26px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text)}
.qty-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.qty-num{font-weight:500;font-size:14px;min-width:20px;text-align:center;color:var(--text)}
.remove-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:4px;border-radius:4px;transition:color 0.2s}
.remove-btn:hover{color:#e33}
.cart-summary{max-width:600px;background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px;margin-top:16px}
.summary-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:8px}
.summary-row.total{font-size:16px;color:var(--text);font-weight:600;border-top:1px solid var(--border);padding-top:10px;margin-top:4px}
.cart-checkout{margin-top:12px;width:100%}

.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
.form-group input{width:100%;background:var(--input-bg);border:1.5px solid var(--input-border);color:var(--text);border-radius:8px;padding:9px 12px;font-size:14px;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;outline:none}
.form-group input:focus{border-color:var(--accent)}
.auth-card{max-width:380px;background:var(--card);border-radius:16px;border:1px solid var(--border);padding:28px;box-shadow:var(--shadow)}
.auth-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--text3);margin-bottom:20px}
.auth-toggle{margin-top:16px;text-align:center;font-size:13px;color:var(--text2)}
.auth-toggle button{background:none;border:none;color:var(--accent);cursor:pointer;font-weight:500;font-family:'DM Sans',sans-serif;font-size:13px}
.profile-card{max-width:480px;background:var(--card);border-radius:16px;border:1px solid var(--border);padding:24px;box-shadow:var(--shadow)}
.avatar{width:64px;height:64px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;font-family:'Barlow Condensed',sans-serif;margin-bottom:12px}
.profile-name{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700}
.profile-email{font-size:13px;color:var(--text3);margin-bottom:20px}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-box{background:var(--bg3);border-radius:10px;padding:12px;text-align:center}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px}
.orders-list{display:flex;flex-direction:column;gap:10px}
.order-item{background:var(--bg3);border-radius:10px;padding:12px;display:flex;justify-content:space-between;align-items:center}
.order-id{font-size:12px;color:var(--text3)}
.order-desc{font-size:13px;font-weight:500;color:var(--text)}
.order-status{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.status-delivered{background:#d1f5e3;color:#1a6640}
.status-transit{background:#fff3d4;color:#8a6000}
[data-theme="dark"] .status-delivered{background:#1a3d2a;color:#5dd99a}
[data-theme="dark"] .status-transit{background:#3a3010;color:#f5c842}
.divider{height:1px;background:var(--border);margin:16px 0}
.toast{position:fixed;bottom:20px;right:20px;background:var(--nav);color:var(--nav-text);padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;transform:translateY(60px);opacity:0;transition:all 0.3s;border-left:3px solid var(--accent)}
.toast.show{transform:translateY(0);opacity:1}
.wishlist-count{font-size:12px;color:var(--text3);margin-bottom:12px}
</style>
</head>
<body>

<h2 class="sr-only">APEX Sport — Loja de Artigos Esportivos com Carrinho, Conta de Usuário e Modo Escuro</h2>

<nav>
  <div class="logo">⚡ APEX</div>
  <div class="nav-links">
    <button class="active" onclick="showPage('home')">Loja</button>
    <button onclick="showPage('wishlist')">Favoritos</button>
    <button onclick="showPage('cart')">Carrinho</button>
  </div>
  <div class="nav-right">
    <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Alternar tema">🌙</button>
    <button class="icon-btn" onclick="showPage('cart')" title="Carrinho">
      🛒<span class="cart-badge" id="cart-count">0</span>
    </button>
    <button class="icon-btn" onclick="showPage('account')" title="Conta">👤</button>
  </div>
</nav>

<div id="page-home" class="page active">
  <div class="hero">
    <h1>EQUIPAMENTO<br><span>DE ELITE</span></h1>
    <p>Tudo que você precisa para superar seus limites — de tênis a suplementos.</p>
    <button class="btn-primary" onclick="document.getElementById('produtos').scrollIntoView({behavior:'smooth'})">Ver produtos →</button>
  </div>
  <div id="produtos">
    <div class="section-title">Nossos Produtos</div>
    <div class="section-sub">Selecione uma categoria para filtrar</div>
    <div class="cats">
      <button class="cat-btn active" onclick="filterCat(this,'all')">Tudo</button>
      <button class="cat-btn" onclick="filterCat(this,'calcados')">Calçados</button>
      <button class="cat-btn" onclick="filterCat(this,'roupas')">Roupas</button>
      <button class="cat-btn" onclick="filterCat(this,'acessorios')">Acessórios</button>
      <button class="cat-btn" onclick="filterCat(this,'suplementos')">Suplementos</button>
      <button class="cat-btn" onclick="filterCat(this,'equipamentos')">Equipamentos</button>
    </div>
    <div class="products-grid" id="products-grid"></div>
  </div>
</div>

<div id="page-cart" class="page">
  <div class="section-title">Carrinho</div>
  <div class="section-sub" id="cart-sub">Seus itens selecionados</div>
  <div id="cart-content"></div>
</div>

<div id="page-wishlist" class="page">
  <div class="section-title">Favoritos</div>
  <div class="wishlist-count" id="wishlist-count"></div>
  <div class="products-grid" id="wishlist-grid"></div>
</div>

<div id="page-account" class="page">
  <div id="auth-section"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const products=[
  {id:1,name:'Tênis Runner Pro X',cat:'calcados',price:349.90,old:429.90,icon:'👟',badge:'sale',fav:false,qty:0},
  {id:2,name:'Camiseta Dry-Fit Elite',cat:'roupas',price:89.90,icon:'👕',badge:'new',fav:false,qty:0},
  {id:3,name:'Mochila Treino 30L',cat:'acessorios',price:179.90,old:219.90,icon:'🎒',badge:'sale',fav:false,qty:0},
  {id:4,name:'Proteína Whey 2kg',cat:'suplementos',price:219.90,icon:'🥤',badge:'',fav:false,qty:0},
  {id:5,name:'Halteres 10kg (par)',cat:'equipamentos',price:159.90,icon:'🏋️',badge:'',fav:false,qty:0},
  {id:6,name:'Shorts Compressão',cat:'roupas',price:69.90,icon:'🩳',badge:'new',fav:false,qty:0},
  {id:7,name:'Garrafa Térmica 1L',cat:'acessorios',price:79.90,icon:'🧴',badge:'',fav:false,qty:0},
  {id:8,name:'Creatina 500g',cat:'suplementos',price:99.90,icon:'💊',badge:'',fav:false,qty:0},
  {id:9,name:'Tênis Basquete Air',cat:'calcados',price:489.90,icon:'🏀',badge:'new',fav:false,qty:0},
  {id:10,name:'Corda de Pular Pro',cat:'equipamentos',price:49.90,icon:'🪢',badge:'',fav:false,qty:0},
  {id:11,name:'Jaqueta Corta-Vento',cat:'roupas',price:249.90,old:319.90,icon:'🧥',badge:'sale',fav:false,qty:0},
  {id:12,name:'Meias Esportivas (6x)',cat:'acessorios',price:59.90,icon:'🧦',badge:'new',fav:false,qty:0},
];
let cart=[];
let user=null;
let currentCat='all';
let theme='light';

function toggleTheme(){
  theme=theme==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',theme==='dark'?'dark':'');
  document.getElementById('theme-btn').textContent=theme==='light'?'🌙':'☀️';
}
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-links button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  const idx={'home':0,'wishlist':1,'cart':2};
  if(idx[id]!==undefined) document.querySelectorAll('.nav-links button')[idx[id]].classList.add('active');
  if(id==='cart') renderCart();
  if(id==='account') renderAccount();
  if(id==='wishlist') renderWishlist();
}
function filterCat(el,cat){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  currentCat=cat;
  renderProducts();
}
function renderProducts(){
  const g=document.getElementById('products-grid');
  const list=currentCat==='all'?products:products.filter(p=>p.cat===currentCat);
  g.innerHTML=list.map(p=>`
    <div class="product-wrap">
      ${p.badge==='sale'?'<span class="badge-sale">OFERTA</span>':''}
      ${p.badge==='new'?'<span class="badge-new">NOVO</span>':''}
      <div class="product-card" onclick="">
        <div class="product-img">${p.icon}</div>
        <div class="product-info">
          <div class="product-cat">${catLabel(p.cat)}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-price">${p.old?`<span class="old">R$${p.old.toFixed(2)}</span>`:''}R$${p.price.toFixed(2)}</div>
          <div class="product-actions">
            <button class="btn-add" onclick="addToCart(${p.id})">+ Carrinho</button>
            <button class="btn-fav${p.fav?' active':''}" onclick="toggleFav(${p.id})" id="fav-${p.id}">${p.fav?'❤️':'🤍'}</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}
function catLabel(c){return{calcados:'Calçados',roupas:'Roupas',acessorios:'Acessórios',suplementos:'Suplementos',equipamentos:'Equipamentos'}[c]||c}
function addToCart(id){
  const p=products.find(x=>x.id===id);
  const ci=cart.find(x=>x.id===id);
  if(ci) ci.qty++;
  else cart.push({...p,qty:1});
  updateCartBadge();
  showToast(`${p.icon} ${p.name} adicionado!`);
}
function updateCartBadge(){
  const total=cart.reduce((a,b)=>a+b.qty,0);
  document.getElementById('cart-count').textContent=total;
}
function toggleFav(id){
  const p=products.find(x=>x.id===id);
  p.fav=!p.fav;
  const btn=document.getElementById('fav-'+id);
  if(btn){btn.textContent=p.fav?'❤️':'🤍';btn.classList.toggle('active',p.fav);}
  showToast(p.fav?`❤️ ${p.name} favoritado!`:`💔 Removido dos favoritos`);
}
function renderCart(){
  const el=document.getElementById('cart-content');
  if(!cart.length){
    el.innerHTML=`<div class="cart-empty"><div class="icon">🛒</div><div>Seu carrinho está vazio.</div><br><button class="btn-primary" onclick="showPage('home')">Ver produtos →</button></div>`;
    return;
  }
  const subtotal=cart.reduce((a,b)=>a+b.price*b.qty,0);
  const frete=subtotal>300?0:19.90;
  const total=subtotal+frete;
  el.innerHTML=`
    <div class="cart-list">${cart.map(item=>`
      <div class="cart-item">
        <div class="icon">${item.icon}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">R$${item.price.toFixed(2)}</div>
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
          </div>
        </div>
        <button class="remove-btn" onclick="removeItem(${item.id})">✕</button>
      </div>`).join('')}
    </div>
    <div class="cart-summary">
      <div class="summary-row"><span>Subtotal</span><span>R$${subtotal.toFixed(2)}</span></div>
      <div class="summary-row"><span>Frete</span><span>${frete===0?'<span style="color:var(--success)">Grátis</span>':'R$'+frete.toFixed(2)}</span></div>
      ${subtotal<300&&subtotal>0?`<div class="summary-row"><span style="color:var(--accent);font-size:12px">Falta R$${(300-subtotal).toFixed(2)} para frete grátis!</span></div>`:''}
      <div class="summary-row total"><span>Total</span><span>R$${total.toFixed(2)}</span></div>
      <button class="btn-primary cart-checkout" onclick="checkout()">Finalizar Compra →</button>
    </div>`;
}
function changeQty(id,delta){
  const ci=cart.find(x=>x.id===id);
  if(!ci) return;
  ci.qty+=delta;
  if(ci.qty<=0) cart=cart.filter(x=>x.id!==id);
  updateCartBadge();renderCart();
}
function removeItem(id){
  cart=cart.filter(x=>x.id!==id);
  updateCartBadge();renderCart();
  showToast('Item removido do carrinho');
}
function checkout(){
  if(!user){showToast('⚠️ Faça login para finalizar!');setTimeout(()=>showPage('account'),1200);return;}
  cart=[];updateCartBadge();
  user.orders++;user.spent+=Math.random()*500+100;
  showToast('✅ Pedido realizado com sucesso!');
  renderCart();
}
function renderWishlist(){
  const favs=products.filter(p=>p.fav);
  document.getElementById('wishlist-count').textContent=favs.length?`${favs.length} produto${favs.length>1?'s':''} favoritado${favs.length>1?'s':''}`:' ';
  const g=document.getElementById('wishlist-grid');
  if(!favs.length){g.innerHTML='<div style="color:var(--text3);padding:20px 0">Você ainda não tem favoritos. Clique em 🤍 para adicionar!</div>';return;}
  g.innerHTML=favs.map(p=>`
    <div class="product-wrap">
      <div class="product-card">
        <div class="product-img">${p.icon}</div>
        <div class="product-info">
          <div class="product-cat">${catLabel(p.cat)}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-price">R$${p.price.toFixed(2)}</div>
          <div class="product-actions">
            <button class="btn-add" onclick="addToCart(${p.id})">+ Carrinho</button>
            <button class="btn-fav active" onclick="toggleFav(${p.id});renderWishlist()">❤️</button>
          </div>
        </div>
      </div>
    </div>`).join('');
}
function renderAccount(){
  const el=document.getElementById('auth-section');
  if(user){
    el.innerHTML=`
      <div class="profile-card">
        <div class="avatar">${user.name[0]}</div>
        <div class="profile-name">${user.name}</div>
        <div class="profile-email">${user.email}</div>
        <div class="profile-stats">
          <div class="stat-box"><div class="stat-num">${user.orders}</div><div class="stat-label">Pedidos</div></div>
          <div class="stat-box"><div class="stat-num">${products.filter(p=>p.fav).length}</div><div class="stat-label">Favoritos</div></div>
          <div class="stat-box"><div class="stat-num">R$${user.spent.toFixed(0)}</div><div class="stat-label">Gasto</div></div>
        </div>
        <div class="section-title" style="font-size:18px;margin-bottom:12px">Pedidos Recentes</div>
        <div class="orders-list">
          <div class="order-item"><div><div class="order-id">#APX-2847</div><div class="order-desc">Tênis Runner Pro X + Mochila</div></div><span class="order-status status-delivered">Entregue</span></div>
          <div class="order-item"><div><div class="order-id">#APX-2831</div><div class="order-desc">Whey Protein + Creatina</div></div><span class="order-status status-transit">Em Trânsito</span></div>
        </div>
        <div class="divider"></div>
        <button class="btn-outline" onclick="logout()" style="width:100%">Sair da conta</button>
      </div>`;
  } else {
    renderAuthForm('login');
  }
}
function renderAuthForm(mode){
  const el=document.getElementById('auth-section');
  if(mode==='login'){
    el.innerHTML=`
      <div class="auth-card">
        <div class="auth-title">Entrar</div>
        <div class="auth-sub">Acesse sua conta APEX</div>
        <div class="form-group"><label>E-mail</label><input type="email" id="a-email" placeholder="seu@email.com"></div>
        <div class="form-group"><label>Senha</label><input type="password" id="a-pass" placeholder="••••••••"></div>
        <button class="btn-primary" style="width:100%" onclick="login()">Entrar →</button>
        <div class="auth-toggle">Não tem conta? <button onclick="renderAuthForm('register')">Cadastre-se</button></div>
      </div>`;
  } else {
    el.innerHTML=`
      <div class="auth-card">
        <div class="auth-title">Criar Conta</div>
        <div class="auth-sub">Junte-se à APEX Sport</div>
        <div class="form-group"><label>Nome completo</label><input type="text" id="r-name" placeholder="João Silva"></div>
        <div class="form-group"><label>E-mail</label><input type="email" id="r-email" placeholder="seu@email.com"></div>
        <div class="form-group"><label>Senha</label><input type="password" id="r-pass" placeholder="Mín. 6 caracteres"></div>
        <button class="btn-primary" style="width:100%" onclick="register()">Criar Conta →</button>
        <div class="auth-toggle">Já tem conta? <button onclick="renderAuthForm('login')">Entrar</button></div>
      </div>`;
  }
}
function login(){
  const email=document.getElementById('a-email').value;
  const pass=document.getElementById('a-pass').value;
  if(!email||!pass){showToast('⚠️ Preencha todos os campos');return;}
  user={name:email.split('@')[0].replace(/\b\w/g,c=>c.toUpperCase()),email,orders:3,spent:847.60};
  showToast(`👋 Bem-vindo(a), ${user.name}!`);
  renderAccount();
}
function register(){
  const name=document.getElementById('r-name').value;
  const email=document.getElementById('r-email').value;
  const pass=document.getElementById('r-pass').value;
  if(!name||!email||pass.length<6){showToast('⚠️ Preencha todos os campos corretamente');return;}
  user={name,email,orders:0,spent:0};
  showToast(`🎉 Conta criada! Bem-vindo(a), ${name}!`);
  renderAccount();
}
function logout(){user=null;showToast('👋 Até logo!');renderAccount();}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
renderProducts();
</script>
</body>
</html>
