<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terraria 2D - Sandbox Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1>⛏️ Terraria 2D</h1>
            <div class="game-info">
                <div class="info-item">
                    <span class="label">Saúde:</span>
                    <div class="health-bar">
                        <div class="health-fill" id="healthFill"></div>
                    </div>
                    <span class="health-text" id="healthText">100/100</span>
                </div>
                <div class="info-item">
                    <span class="label">Dia/Noite:</span>
                    <span id="timeText">Dia</span>
                </div>
            </div>
        </div>

        <div class="game-wrapper">
            <canvas id="gameCanvas" width="1280" height="720"></canvas>
        </div>

        <div class="game-footer">
            <div class="controls">
                <div class="control-group">
                    <h3>Controles</h3>
                    <p><strong>A/D</strong> - Mover | <strong>Espaço</strong> - Pular</p>
                    <p><strong>Clique</strong> - Minerar/Atacar | <strong>Shift+Clique</strong> - Colocar Bloco</p>
                    <p><strong>1-5</strong> - Selecionar Inventário | <strong>C</strong> - Crafting</p>
                </div>
                <div class="control-group">
                    <h3>Ações</h3>
                    <button id="saveBtn">💾 Salvar Mundo</button>
                    <button id="loadBtn">📂 Carregar Mundo</button>
                    <button id="newBtn">🆕 Novo Mundo</button>
                </div>
            </div>

            <div class="inventory-panel">
                <h3>Inventário</h3>
                <div class="inventory-grid" id="inventoryGrid"></div>
            </div>

            <div class="crafting-panel" id="craftingPanel" style="display: none;">
                <h3>Crafting</h3>
                <div class="crafting-recipes" id="craftingRecipes"></div>
            </div>
        </div>
    </div>

    <script src="constants.js"></script>
    <script src="world.js"></script>
    <script src="player.js"></script>
    <script src="enemy.js"></script>
    <script src="game.js"></script>
</body>
</html>
